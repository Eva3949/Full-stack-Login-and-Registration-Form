<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f3f7;
            margin: 0;
            padding: 20px;
        }
        .dashboard-container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .user-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #007bff;
        }
        .info-label {
            font-weight: bold;
            color: #666;
            margin-bottom: 5px;
        }
        .info-value {
            color: #333;
            font-size: 16px;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: block;
            margin: 20px auto;
        }
        .logout-btn:hover {
            background: #c82333;
        }
        .welcome-message {
            text-align: center;
            color: #28a745;
            font-size: 18px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>Welcome to Your Dashboard</h1>
            <div class="welcome-message">Login successful! Here's your profile information:</div>
        </div>

        <div class="user-info" id="userInfo">
            <div class="info-card">
                <div class="info-label">Full Name</div>
                <div class="info-value" id="fullName">Loading...</div>
            </div>
            <div class="info-card">
                <div class="info-label">Email</div>
                <div class="info-value" id="email">Loading...</div>
            </div>
            <div class="info-card">
                <div class="info-label">Phone Number</div>
                <div class="info-value" id="phone">Loading...</div>
            </div>
            <div class="info-card">
                <div class="info-label">Department</div>
                <div class="info-value" id="department">Loading...</div>
            </div>
            <div class="info-card">
                <div class="info-label">Gender</div>
                <div class="info-value" id="gender">Loading...</div>
            </div>
            <div class="info-card">
                <div class="info-label">Hobbies</div>
                <div class="info-value" id="hobbies">Loading...</div>
            </div>
            <div class="info-card">
                <div class="info-label">Member Since</div>
                <div class="info-value" id="memberSince">Loading...</div>
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <script>
        // Check if user is logged in
        function checkAuth() {
            // This would normally check with the server
            // For now, we'll simulate it
            return true;
        }

        // Load user data
        function loadUserData() {
            // In a real application, this would fetch data from the server
            // For demo purposes, we'll use session data or stored data
            
            // Try to get user data from localStorage (set during login)
            const userData = localStorage.getItem('userData');
            
            if (userData) {
                const user = JSON.parse(userData);
                document.getElementById('fullName').textContent = `${user.firstName} ${user.lastName}`;
                document.getElementById('email').textContent = user.email;
                document.getElementById('phone').textContent = user.phone;
                document.getElementById('department').textContent = getDepartmentName(user.department);
                document.getElementById('gender').textContent = getGenderName(user.gender);
                document.getElementById('hobbies').textContent = formatHobbies(user.hobbies);
                document.getElementById('memberSince').textContent = formatDate(user.createdAt);
            } else {
                // Redirect to login if no user data
                window.location.href = 'LOGIN.html';
            }
        }

        function getDepartmentName(dept) {
            const departments = {
                'cs': 'Computer Science',
                'se': 'Software Engineering',
                'civil': 'Civil Engineering',
                'mech': 'Mechanical Engineering'
            };
            return departments[dept] || dept;
        }

        function getGenderName(gender) {
            const genders = {
                'male': 'Male',
                'female': 'Female',
                'other': 'Other'
            };
            return genders[gender] || gender;
        }

        function formatHobbies(hobbies) {
            if (!hobbies) return 'Not specified';
            return hobbies.split(',').map(h => h.charAt(0).toUpperCase() + h.slice(1)).join(', ');
        }

        function formatDate(dateString) {
            if (!dateString) return 'Unknown';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        function logout() {
            // Clear localStorage
            localStorage.removeItem('userData');
            
            // Redirect to login page
            window.location.href = 'LOGIN.html';
        }

        // Load user data when page loads
        document.addEventListener('DOMContentLoaded', function() {
            if (checkAuth()) {
                loadUserData();
            } else {
                window.location.href = 'LOGIN.html';
            }
        });
    </script>
</body>
</html>
