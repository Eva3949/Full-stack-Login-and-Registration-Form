<!DOCTYPE html>
<html>
    <head>
        <title>

        </title>
        <style>
            body{
                font-family: Arial,sans-serif;
                background: #f2f3f7;
                display: flex;
                height: 100vh;
                justify-content: center;
                align-items: center;
            }
            .con{
                background: #fff;
                padding: 30px;
                width: 700px;
                border-radius: 12px;
                box-shadow:0 4px 20px rgba(0,0,0,0.1);
            }
          .row{
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
          }
          .input-group{
            flex: 1;
          }
          h2{
            text-align: center;
            margin-bottom: 15px;
          }
          .button{
            text-align: center;
            margin-top: 20PX;
          }
          textarea{
            height: 80px;
          }
          input , select , textarea{
            width: 95%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            
          }
          .section{
            margin-top: 15px;
          }
          .button{
            text-align: center;
            margin-top: 20px;
            
          }
          .btn{
            padding: 10px 25px;
            border: none;
            color: white;
            cursor: pointer;
            margin: 5px;
            border-radius: 10px;
          }
          .register{
            background: #007bff;
          }
          .clear{
            background: #dc3545;
          }
        </style>
    </head>
    <body>
        <div class="con">
            
            <h2>Registration Form</h2>
            <div class="row">
            
                <div class="input group">
                    <label>First Name:</label>
                    <input type="text" id="firstName">
                </div>

                <div class="input group">
                    <label>Last Name:</label>
                    <input type="text" id="lastName">
                </div>

                <div class="input group">
                    <label>Department</label>
                    <select id="department">
                        <option value="">Select Department</option>
                        <option value="cs">Computer science</option>
                        <option value="se">Software Engineering</option>
                        <option value="civil">Civil</option>
                        <option value="mech">Mechanical</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="input group">
                    <label>Email:</label>
                    <input type="email" id="email" placeholder="example@email.com">
                </div>

                <div class="input group">
                    <label>Phone Number:</label>
                    <input type="tel" id="phone" placeholder="Enter at least 10 digits">
                </div>

                <div class="input group">
                    <label>Password:</label>
                    <input type="password" id="password" placeholder="Min 8 characters with special chars">
                </div>
            </div>

            <div class="row">
                
                <div class="input group">
                    <label>Gender</label>
                    <input type="radio" name="Gender" value="male">Male<br>
                    <input type="radio" name="Gender" value="female">Female<br>
                    <input type="radio" name="Gender" value="other">Other
                </div>

                <div class="input group">
                    <label>Hobbies</label>
                    <input type="checkbox" name="Hobbies" value="reading">Reading<br>
                    <input type="checkbox" name="Hobbies" value="sport">Sport<br>
                    <input type="checkbox" name="Hobbies" value="music">Music<br>
                    <input type="checkbox" name="Hobbies" value="travel">Travel
                </div>

                <div class="input group">
                    <label >Other</label>
                    <textarea></textarea>
                </div>
            </div>

            <div class="button">
                <button class="btn register">Register</button>
                <button class="btn clear">Clear</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
