<!DOCTYPE html>
<html>
    <head>
        <Title></Title>
        <style>
            body{
                font-family: Arial,sans-serif;
                background: #f2f3f7;
            }
            .con{
                background: #fff;
                margin:300px auto;
                padding: 30px;
                width: 350px;
                border-radius: 12px;
                box-shadow:0 4px 20px rgba(0,0,0,0.1);
               
            }
            .con2{
                background: #fff;
                margin:300px auto;
                padding: 30px;
                width: 350px;
                border-radius: 12px;
                box-shadow:0 4px 20px rgba(0,0,0,0.1);
                display:hidden;
                
               
            }
            h2{
                margin-bottom: 20px;
                 text-align: center;
            }
            input{
                width: 100%;
                padding: 10px;
                margin: 10px 0 20px;
                border-radius: 8px;
                border: 1px solid #ccc;
            }
            .button{
                display: flex;
                justify-content: center;
                gap: 10px;
            }
            .btn{
                padding: 10px 20px;
                border: none;
                border-radius: 8px;
                color: white;
                cursor: pointer;
            }
            .login{
                background:#007bff;
            }
            .clear{
                background: #dc3545;
            }
            a{
                display: block;
                margin-top: 15px;
                color: #007bff;
                text-decoration: none;
                 text-align: center;
            }
            .l1{
                text-align: left;
            }
        </style>
    </head>
    <body>  
        <div class="con">
            <h2>Login Form</h2>
        <label class="l1"></label>username:</label>
        <input type="text" placeholder="Enter your name">

        <label >password:</label>
        <input type="password" placeholder="Enter password">

        <div class="button">
            <button class="btn login">Login</button>
            <button class="btn clear">Clear</button>
        </div>

        <a href="#">Create New Account</a>
    </div>

    <div>
        <h3 class="con2">registered successfully</h3>
    </div>

    <script src="script.js"></script>
    </body>
</html>
